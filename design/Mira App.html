<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mira — Voice & Memory</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@500;600;700&family=Inter:wght@400;500;600&family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(1200px 700px at 50% -10%, #ffffff 0%, #ececef 55%, #e4e4e9 100%);
    font-family: Inter, -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #stage { transform-origin: center center; }

  /* ── device ─────────────────────────────────────────────── */
  .mira-bezel {
    width: 419px; height: 878px; padding: 13px;
    border-radius: 56px;
    background: linear-gradient(150deg, #2b2c30 0%, #46474c 18%, #1d1e21 40%, #3a3b40 70%, #232427 100%);
    box-shadow:
      0 50px 100px -20px rgba(20,22,40,0.45),
      0 18px 40px -16px rgba(20,22,40,0.35),
      inset 0 0 0 1.5px rgba(255,255,255,0.10),
      inset 0 0 2px 2px rgba(0,0,0,0.5);
  }
  .mira-screen {
    position: relative; width: 393px; height: 852px;
    border-radius: 44px; overflow: hidden; background: #F5F5F5;
  }
  .mira-island {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 124px; height: 36px; border-radius: 20px; background: #000; z-index: 50;
  }
  .mira-statusbar {
    position: absolute; top: 0; left: 0; right: 0; height: 48px; z-index: 40;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px 0;
  }
  .mira-clock {
    font-family: -apple-system, "SF Pro", system-ui; font-weight: 600;
    font-size: 15px; color: #1a1a1a; letter-spacing: 0.2px;
  }
  .mira-status-icons { display: flex; align-items: center; gap: 7px; }
  .mira-home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 139px; height: 5px; border-radius: 100px; background: rgba(0,0,0,0.30); z-index: 60;
  }

  .mira-page { position: absolute; inset: 0; opacity: 1; transform: none; transition: opacity 0.42s ease, transform 0.42s ease; }
  .mira-page.is-entering { opacity: 0; transform: translateY(6px); }
  .mira-screen-body { position: absolute; inset: 0; }

  /* ── left-edge swipe-to-back ── */
  .mira-swipeback { position: absolute; inset: 0; touch-action: pan-y; }
  .mira-swipeback-page { position: absolute; inset: 0; will-change: transform; }
  .mira-swipeback-page > * { position: absolute; inset: 0; }
  .mira-swipeback-hint {
    position: absolute; top: 50%; left: 12px; z-index: 60;
    width: 34px; height: 34px; margin-top: -17px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; color: #14328C;
    background: rgba(251,251,249,0.92);
    box-shadow: 0 4px 16px rgba(20,28,44,0.16);
    pointer-events: none;
  }

  /* ── header ─────────────────────────────────────────────── */
  .mira-header {
    position: absolute; top: 52px; left: 24px; right: 24px;
    display: flex; align-items: center; justify-content: space-between; z-index: 6;
  }
  .mira-iconbtn {
    width: 48px; height: 48px; border-radius: 80px; border: none; background: transparent;
    display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0;
    -webkit-tap-highlight-color: transparent; transition: transform .12s ease, background .15s ease;
  }
  .mira-iconbtn:active { transform: scale(0.92); }
  .mira-iconbtn--ring { box-shadow: inset 0 0 0 0.5px rgba(237,241,255,0.9), 0 4px 12px rgba(20,22,50,0.07); background: rgba(255,255,255,0.7); }
  .mira-header-dot {
    position: absolute; top: 2px; right: 2px; width: 8px; height: 8px;
    border-radius: 50%; background: #6E8BFF;
  }

  /* ── typography ─────────────────────────────────────────── */
  .t-title { margin: 0; font-family: Dosis, sans-serif; font-weight: 700; font-size: 40px; line-height: 1.04; color: #262626; white-space: nowrap; }
  .t-sub { margin: 0; font-family: Vazirmatn, sans-serif; font-weight: 700; font-size: 18px; line-height: 1; color: #6A5EE2; white-space: nowrap; }
  .t-listen-sub { margin: 0; font-family: Dosis, sans-serif; font-weight: 500; font-size: 18px; line-height: 1.1; text-align: center; color: #797979; }
  .t-tip { margin: 0; font-family: Vazirmatn, sans-serif; font-weight: 700; font-size: 14px; line-height: 1.2; text-align: center; color: #1F2E6B; white-space: nowrap; }
  .t-placeholder { font-family: Vazirmatn, sans-serif; font-weight: 700; font-size: 14px; color: #595959; white-space: nowrap; }
  .t-timer { font-family: Vazirmatn, sans-serif; font-weight: 700; font-size: 18px; color: #262626; font-variant-numeric: tabular-nums; }
  .t-tapstop { font-family: Vazirmatn, sans-serif; font-weight: 400; font-size: 10px; color: #595959; text-transform: uppercase; letter-spacing: 0.6px; }
  .t-bubble { font-family: Inter, sans-serif; font-weight: 400; font-size: 14px; line-height: 1.3; color: #141414; }
  .t-mira { margin: 0; font-family: Inter, sans-serif; font-weight: 500; font-size: 14px; line-height: 1.35; color: #141414; }
  .t-savepill { font-family: Inter, sans-serif; font-weight: 400; font-size: 12px; color: #4364E8; }

  /* ── orb (blue energy animates INSIDE the circle) ───────── */
  .mira-orb { position: relative; filter: drop-shadow(0 10px 26px rgba(74,110,255,0.22)); }
  .mira-orb-clip { position: relative; overflow: hidden; }
  .mira-orb-img { position: absolute; inset: 0; border-radius: 50%; }
  .mira-orb:not(.is-listening) .mira-orb-img { animation: miraBreathe 5s ease-in-out infinite; }
  .mira-orb-blob { position: absolute; border-radius: 50%; filter: blur(10px); opacity: 0; mix-blend-mode: screen; will-change: transform, opacity; }
  .mira-orb.is-listening .mira-orb-blob--a { left: 4%; top: 8%; width: 62%; height: 62%; background: radial-gradient(circle, rgba(74,110,255,0.95) 0%, rgba(74,110,255,0) 65%); animation: orbBlobA 2.8s ease-in-out infinite; }
  .mira-orb.is-listening .mira-orb-blob--b { left: 30%; top: 26%; width: 54%; height: 54%; background: radial-gradient(circle, rgba(120,150,255,0.85) 0%, rgba(120,150,255,0) 66%); animation: orbBlobB 3.5s ease-in-out infinite; }
  .mira-orb.is-listening .mira-orb-blob--c { left: 22%; top: 34%; width: 46%; height: 46%; background: radial-gradient(circle, rgba(40,84,235,0.8) 0%, rgba(40,84,235,0) 60%); animation: orbBlobC 2.2s ease-in-out infinite; }
  .mira-orb-hit { position: absolute; width: 145px; height: 145px; border-radius: 50%; border: none; background: transparent; cursor: pointer; z-index: 4; -webkit-tap-highlight-color: transparent; }

  /* ── bottom navigation (exact PNG from the design) ──────── */
  .mira-tabwrap { position: absolute; left: 0; right: 0; bottom: 16px; height: 100px; z-index: 8; pointer-events: none; }
  .mira-navimg { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); width: 396px; height: 100px; display: block; user-select: none; -webkit-user-drag: none; }
  .mira-nav-hit { position: absolute; bottom: 0; border: none; background: transparent; cursor: pointer; padding: 0; pointer-events: auto; -webkit-tap-highlight-color: transparent; }
  .mira-nav-hit--home { left: 24px; width: 120px; height: 78px; }
  .mira-nav-hit--daily { right: 24px; width: 120px; height: 78px; }
  .mira-nav-hit--mic { left: 50%; transform: translateX(-50%); bottom: 36px; width: 72px; height: 72px; border-radius: 50%; transition: transform .14s ease; }
  .mira-nav-hit--mic:active { transform: translateX(-50%) scale(0.93); }

  /* ── listening stop ─────────────────────────────────────── */
  .mira-stop {
    width: 72px; height: 72px; border-radius: 50%; background: #C7D2FF; border: none; cursor: pointer;
    box-shadow: 0 0 3px 0 rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center;
    transition: transform .12s ease;
  }
  .mira-stop:active { transform: scale(0.93); }
  .mira-stop-sq { width: 20px; height: 20px; border-radius: 4px; background: #00206B; }

  /* ── chat ───────────────────────────────────────────────── */
  .mira-bubble {
    background: #fff; border-radius: 16px; padding: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.045), inset 0 0 0 0.5px rgba(191,191,191,0.35);
  }
  .mira-savepill { display: flex; align-items: center; gap: 5px; height: 25px; }
  .mira-btn {
    height: 38px; border-radius: 8px; cursor: pointer; border: none;
    font-family: Vazirmatn, sans-serif; font-weight: 500; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: transform .12s ease, filter .15s ease;
  }
  .mira-btn:active { transform: scale(0.97); }
  .mira-btn--solid { background: #002A8C; color: #fff; }
  .mira-btn--solid:hover { filter: brightness(1.1); }
  .mira-btn--ghost { background: transparent; color: #002A8C; box-shadow: inset 0 0 0 1px #002A8C; }
  .mira-saved-banner {
    height: 38px; border-radius: 8px; background: #002A8C; color: #fff;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: Vazirmatn, sans-serif; font-weight: 500; font-size: 14px;
  }

  /* ── title header (Daily Brief / onboarding) ── */
  .mira-titlehead { position: absolute; top: 52px; left: 24px; right: 24px; height: 48px; display: flex; align-items: center; z-index: 6; }
  .mira-titlehead-c { position: absolute; left: 0; right: 0; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; }
  .mira-titlehead-r { margin-left: auto; }
  .t-headtitle { font-family: Dosis, sans-serif; font-weight: 700; font-size: 20px; color: #1A1C29; line-height: 1; white-space: nowrap; }
  .t-headsub { font-family: Vazirmatn, sans-serif; font-weight: 400; font-size: 12px; color: #8A8A8A; line-height: 1; white-space: nowrap; }

  /* ── Daily Brief ── */
  .db-scroll { position: absolute; left: 0; right: 0; top: 116px; bottom: 0; overflow-y: auto; padding: 8px 24px 0; -webkit-overflow-scrolling: touch; }
  .db-scroll::-webkit-scrollbar { width: 0; }
  .db-section-label { font-family: Vazirmatn, sans-serif; font-weight: 500; font-size: 13px; color: #9A9A9A; margin: 14px 2px 10px; }
  .db-card { position: relative; background: #fff; border-radius: 12px; box-shadow: inset 0 0 0 0.5px #D9D9D9, 0 1px 2px rgba(20,22,55,0.04); padding: 16px; margin-bottom: 12px; }
  .mira-badge { position: absolute; top: 8px; right: 8px; height: 25px; padding: 0 10px; border-radius: 16px; background: #EDF1FF; color: #4A6EFF; font-family: Vazirmatn, sans-serif; font-size: 12px; display: inline-flex; align-items: center; }
  .db-task { display: flex; align-items: center; gap: 12px; min-height: 83px; }
  .db-check { border: none; background: transparent; padding: 0; cursor: pointer; flex-shrink: 0; display: flex; transition: transform .12s ease; }
  .db-check:active { transform: scale(0.9); }
  .db-task-body { display: flex; flex-direction: column; gap: 8px; }
  .db-title { font-family: Vazirmatn, sans-serif; font-weight: 500; font-size: 14px; color: #1F1F1F; }
  .db-meta { display: flex; align-items: center; gap: 6px; font-family: Vazirmatn, sans-serif; font-size: 12px; color: #595959; }
  .db-task.is-done .db-title { text-decoration: line-through; color: #B0B0B0; }
  .db-task.is-done .db-meta { color: #C2C2C2; }
  .db-note { display: flex; gap: 12px; }
  .db-note-icon, .db-note-body { display: flex; }
  .db-note-icon { flex-shrink: 0; }
  .db-note-body { flex-direction: column; gap: 8px; padding-right: 40px; }
  .db-note-text { font-family: Vazirmatn, sans-serif; font-size: 14px; line-height: 1.45; color: #262626; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .db-note-text.is-open { -webkit-line-clamp: unset; }
  .db-more { align-self: flex-start; display: inline-flex; align-items: center; gap: 3px; border: none; background: transparent; padding: 0; cursor: pointer; font-family: Vazirmatn, sans-serif; font-size: 13px; color: #293D8C; }
  .db-image { display: flex; gap: 12px; align-items: flex-start; min-height: 98px; }
  .db-thumb { position: relative; width: 100px; height: 82px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: linear-gradient(135deg, #d7e3f5, #c3d3ee); display: flex; align-items: center; justify-content: center; }
  .db-thumb-stripe { position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.25) 0 8px, transparent 8px 16px); }
  .db-thumb-label { position: relative; font-family: 'SF Mono', ui-monospace, monospace; font-size: 10px; letter-spacing: 0.5px; color: rgba(40,60,120,0.7); text-transform: uppercase; }
  .db-image-text { font-family: Vazirmatn, sans-serif; font-size: 14px; line-height: 1.45; color: #262626; padding-right: 44px; padding-top: 2px; }
  .db-older { display: flex; align-items: center; gap: 12px; width: 100%; border: none; cursor: pointer; background: #FFF4EE; border-radius: 12px; padding: 14px 16px; margin-top: 4px; text-align: left; }
  .db-older-icon { display: flex; flex-shrink: 0; }
  .db-older-body { display: flex; flex-direction: column; gap: 4px; margin-right: auto; }
  .db-older-title { font-family: Vazirmatn, sans-serif; font-weight: 600; font-size: 14px; color: #5A3A1E; }
  .db-older-sub { font-family: Vazirmatn, sans-serif; font-size: 12px; color: #A07A55; }

  /* ── onboarding ── */
  .ob { background: #F5F5F5; }
  .ob-pad { position: absolute; left: 24px; right: 24px; }
  .ob-center { display: flex; flex-direction: column; align-items: center; }
  .ob-center .t-ob-title, .ob-center .t-ob-desc { width: 100%; }
  .ob-input { width: 100%; height: 54px; border-radius: 12px; border: none; background: #FCFCFC; box-shadow: inset 0 0 0 1px #E2E2E6; padding: 0 16px; font-family: Vazirmatn, sans-serif; font-size: 14px; color: #1F1F1F; outline: none; box-sizing: border-box; }
  .ob-input::placeholder { color: #A8A8AE; }
  .ob-input:focus { box-shadow: inset 0 0 0 1.5px #3D63F5; }
  .ob-btn { width: 100%; height: 52px; border-radius: 12px; border: none; cursor: pointer; font-family: Vazirmatn, sans-serif; font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform .12s ease, filter .15s ease; }
  .ob-btn:active { transform: scale(0.98); }
  .ob-btn--navy { background: #14328C; color: #fff; }
  .ob-btn--navy:hover { filter: brightness(1.08); }
  .ob-btn--peri { background: #7E8BC9; color: #fff; }
  .ob-btn--peri:hover { filter: brightness(1.04); }
  .ob-btn--social { background: #fff; color: #1A1A1A; box-shadow: inset 0 0 0 1px #E2E2E6; margin-top: 12px; font-weight: 500; }
  .ob-btn--ghost { background: #fff; color: #14328C; box-shadow: inset 0 0 0 1.4px #14328C; }
  .ob-cta { position: absolute; left: 24px; right: 24px; bottom: 40px; }
  .ob-cta--stack { display: flex; flex-direction: column; gap: 12px; }
  .ob-or { display: flex; align-items: center; gap: 12px; margin: 22px 0 2px; }
  .ob-or-line { flex: 1; height: 1px; background: #E2E2E6; }
  .ob-or-text { font-family: Vazirmatn, sans-serif; font-size: 13px; color: #9A9A9A; }
  .ob-terms { position: absolute; left: 24px; right: 24px; bottom: 34px; text-align: center; font-family: Vazirmatn, sans-serif; font-size: 12px; line-height: 1.5; color: #9A9A9A; }
  .ob-badge-icon { width: 44px; height: 44px; border-radius: 12px; background: #fff; box-shadow: inset 0 0 0 1px #E6E6EA; display: flex; align-items: center; justify-content: center; }
  .ob-center .ob-badge-icon { align-self: center; }
  .t-ob-title { margin: 0; font-family: Dosis, sans-serif; font-weight: 700; font-size: 22px; line-height: 1.2; color: #1A1C29; }
  .t-ob-desc { margin: 6px 0 0; font-family: Vazirmatn, sans-serif; font-size: 13px; line-height: 1.5; color: #8A8A8A; }
  .ob-otp { display: flex; gap: 12px; margin-top: 26px; }
  .ob-otp-box { width: 52px; height: 56px; border-radius: 12px; border: none; background: #fff; box-shadow: inset 0 0 0 1px #E2E2E6; text-align: center; font-family: Dosis, sans-serif; font-weight: 700; font-size: 22px; color: #1A1C29; outline: none; }
  .ob-otp-box.is-filled { box-shadow: inset 0 0 0 1.5px #3D63F5; }
  .ob-resend { margin-top: 22px; border: none; background: transparent; cursor: pointer; font-family: Vazirmatn, sans-serif; font-size: 13px; color: #8A8A8A; }
  .ob-resend b { color: #14328C; }
  .ob-splash { position: absolute; left: 32px; right: 32px; top: 60%; transform: translateY(-50%); }
  .t-splash-brand { display: none; }
  .t-splash-title { margin: 0; font-family: Dosis, sans-serif; font-weight: 700; font-size: 32px; line-height: 1.15; color: #1A1C29; }
  .t-splash-sub { margin: 14px 0 0; font-family: Vazirmatn, sans-serif; font-size: 14px; line-height: 1.5; color: #8A8A8A; max-width: 260px; }
  .ob-recbtn { width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; background: #fff; box-shadow: 0 6px 16px rgba(40,60,160,0.14), inset 0 0 0 1px #ECECEF; display: flex; align-items: center; justify-content: center; transition: transform .12s ease; }
  .ob-recbtn:active { transform: scale(0.92); }
  .t-ob-hello { margin: 0; font-family: Vazirmatn, sans-serif; font-weight: 500; font-size: 14px; letter-spacing: 1px; color: #6A6A6A; }
  .t-understand { margin: 0; font-family: Vazirmatn, sans-serif; font-weight: 700; font-size: 22px; color: #14328C; }

  /* ── setup wizard ───────────────────────────────────────── */
  .wz { background: #F5F5F5; --ink: #1A1C29; --muted: #8A8A8A; --navy: #14328C; --peri: #7E8BC9; }
  .wz-top { position: absolute; top: 54px; left: 20px; right: 20px; display: flex; align-items: center; gap: 14px; z-index: 3; }
  .wz-back { width: 38px; height: 38px; flex-shrink: 0; border: none; background: transparent; cursor: pointer; color: var(--ink); display: flex; align-items: center; justify-content: center; margin-left: -8px; }
  .wz-skip, .wz-skip-ph { flex-shrink: 0; width: 44px; text-align: right; }
  .wz-skip { border: none; background: transparent; cursor: pointer; font-family: Vazirmatn, sans-serif; font-size: 14px; color: var(--muted); }
  .wz-prog { flex: 1; display: flex; gap: 5px; }
  .wz-seg { flex: 1; height: 4px; border-radius: 3px; background: #E2E2E6; transition: background .3s ease; }
  .wz-seg.on { background: var(--navy); }
  .wz-scroll { position: absolute; left: 0; right: 0; top: 108px; bottom: 108px; overflow-y: auto; padding: 8px 26px 12px; -webkit-overflow-scrolling: touch; }
  .wz-scroll::-webkit-scrollbar { width: 0; }
  .wz-cta { position: absolute; left: 24px; right: 24px; bottom: 40px; }
  .wz-h1 { font-size: 30px; line-height: 1.16; }
  .wz-h2 { font-size: 25px; line-height: 1.18; }
  .wz .t-ob-desc { font-size: 13.5px; margin-top: 8px; }
  .wz-input { margin-top: 20px; }
  .wz-fieldlabel { margin: 26px 0 12px; font-family: Vazirmatn, sans-serif; font-weight: 500; font-size: 13px; color: var(--muted); }

  /* hero (welcome / ready) */
  .wz-hero { position: absolute; left: 32px; right: 32px; top: 50%; transform: translateY(-54%); display: flex; flex-direction: column; align-items: center; text-align: center; }
  .wz-hero .wz-h1 { text-align: center; }
  .wz-sub { max-width: 280px; }

  /* orb */
  .wz-orb { position: relative; }
  .wz-orb-core { position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 36% 30%, #aeb9e8 0%, #8b98d6 42%, #6472b6 100%);
    box-shadow: 0 22px 46px -14px rgba(90,105,180,.6), inset 0 2px 8px rgba(255,255,255,.5);
    animation: rdBreathe 6s ease-in-out infinite; }
  .wz-orb-core::after { content: ""; position: absolute; inset: 14px; border-radius: 50%; background: radial-gradient(circle at 62% 66%, rgba(255,255,255,.4), rgba(255,255,255,0) 55%); }
  .wz-orb-ring { position: absolute; inset: -14px; border-radius: 50%; border: 1px solid rgba(126,139,201,.30); animation: rdPulse 6s ease-in-out infinite; }

  /* tone options */
  .wz-tones { display: flex; flex-direction: column; gap: 10px; }
  .wz-tone { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; text-align: left; padding: 14px 18px; border-radius: 14px; background: #fff; border: none; box-shadow: inset 0 0 0 1px #E6E6EA; cursor: pointer; transition: box-shadow .15s, transform .1s; }
  .wz-tone:active { transform: scale(.99); }
  .wz-tone.on { box-shadow: inset 0 0 0 1.6px var(--navy); }
  .wz-tone-l { font-family: Dosis, sans-serif; font-weight: 700; font-size: 16px; color: var(--ink); }
  .wz-tone-s { font-family: Vazirmatn, sans-serif; font-size: 12.5px; color: var(--muted); }

  /* focus chips */
  .wz-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }

  .wz-chip.on { background: #EEF1FB; box-shadow: inset 0 0 0 1.6px var(--navy); color: var(--navy); }

  /* people */
  .wz-addrow { display: flex; gap: 10px; align-items: center; margin-top: 22px; }
  .wz-add { width: 54px; height: 54px; flex-shrink: 0; border-radius: 12px; border: none; background: var(--navy); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .1s, filter .15s; }

  .wz-people { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .wz-person { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px 6px 6px; border-radius: 100px; background: #fff; box-shadow: inset 0 0 0 1px #E6E6EA; font-family: Vazirmatn, sans-serif; font-size: 13.5px; color: var(--ink); }
  .wz-avatar { width: 26px; height: 26px; border-radius: 50%; background: #E6EAF7; color: var(--navy); font-family: Dosis, sans-serif; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; }
  .wz-person-x { border: none; background: transparent; cursor: pointer; color: #B4B4BC; display: flex; padding: 2px; }
  .wz-people-empty { font-family: Vazirmatn, sans-serif; font-size: 12.5px; color: #B0B0B6; }

  /* rhythm */

  .wz-time-l { font-family: Dosis, sans-serif; font-weight: 700; font-size: 15px; color: var(--ink); }
  .wz-time-s { font-family: Vazirmatn, sans-serif; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* toggle rows (quiet hours, permissions) */
  .wz-toggle-row { width: 100%; display: flex; align-items: center; gap: 14px; text-align: left; margin-top: 14px; padding: 15px 18px; border-radius: 14px; background: #fff; border: none; box-shadow: inset 0 0 0 1px #E6E6EA; cursor: pointer; }
  .wz-perm-ic { width: 38px; height: 38px; flex-shrink: 0; border-radius: 10px; background: #F0F2F8; color: #6B7A99; display: flex; align-items: center; justify-content: center; }
  .wz-tr-tx { display: flex; flex-direction: column; gap: 2px; margin-right: auto; }
  .wz-tr-t { font-family: Vazirmatn, sans-serif; font-weight: 600; font-size: 14px; color: var(--ink); }
  .wz-tr-s { font-family: Vazirmatn, sans-serif; font-size: 12px; color: var(--muted); }
  .wz-switch { width: 46px; height: 28px; flex-shrink: 0; border-radius: 100px; background: #D8D8DE; position: relative; transition: background .2s; }
  .wz-switch.on { background: var(--navy); }
  .wz-knob { position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2); transition: transform .2s; }
  .wz-switch.on .wz-knob { transform: translateX(18px); }

  /* sources */
  .wz-sources { display: flex; flex-direction: column; gap: 10px; margin-top: 22px; }
  .wz-source { display: flex; align-items: center; gap: 13px; padding: 12px 14px; border-radius: 14px; background: #fff; box-shadow: inset 0 0 0 1px #E6E6EA; }

  .wz-src-tx { display: flex; flex-direction: column; gap: 2px; margin-right: auto; }

  .wz-src-s { font-family: Vazirmatn, sans-serif; font-size: 12px; color: var(--muted); }
  .wz-connect { flex-shrink: 0; display: inline-flex; align-items: center; gap: 4px; border: none; background: #EDEFF4; color: var(--navy); font-family: Vazirmatn, sans-serif; font-weight: 600; font-size: 13px; padding: 8px 15px; border-radius: 100px; cursor: pointer; transition: transform .1s, background .15s, color .15s; }

  /* import rows (selectable) */

  .wz-imp:active { transform: scale(.99); }

  .wz-imp-check { width: 24px; height: 24px; flex-shrink: 0; border-radius: 50%; box-shadow: inset 0 0 0 1.6px #D2D2DA; display: flex; align-items: center; justify-content: center; transition: background .15s, box-shadow .15s; }

  .wz-imp-note { display: flex; gap: 9px; align-items: flex-start; margin-top: 16px; padding: 0 2px; font-family: Vazirmatn, sans-serif; font-size: 12.5px; line-height: 1.5; color: var(--muted); }
  .wz-imp-note svg { flex-shrink: 0; margin-top: 1px; color: #B0B0B6; }

  /* privacy policy link */
  .wz-policy { display: inline-flex; align-items: center; gap: 8px; margin: 20px 2px 4px; border: none; background: transparent; cursor: pointer; font-family: Vazirmatn, sans-serif; font-weight: 500; font-size: 13px; color: var(--navy); }
  .wz-policy svg { color: var(--navy); }

  /* referral invite */
  .wz-invite { display: flex; flex-direction: column; height: 100%; }

  .wz-inv-gift { width: 72px; height: 72px; border-radius: 22px; background: linear-gradient(150deg, #3550C4, #1B2570); display: flex; align-items: center; justify-content: center; box-shadow: 0 14px 30px -12px rgba(40,60,168,.55); }
  .wz-inv-code { width: 100%; margin-top: 26px; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 15px 16px 16px; text-align: left; }
  .wz-inv-label { font-size: 11.5px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #9A9AA2; }
  .wz-inv-coderow { display: flex; align-items: center; gap: 12px; margin-top: 9px; }
  .wz-inv-val { flex: 1; font-size: 21px; font-weight: 700; letter-spacing: .08em; color: var(--navy); font-family: Vazirmatn, sans-serif; }
  .wz-inv-copy { display: inline-flex; align-items: center; gap: 6px; border: none; cursor: pointer; padding: 9px 15px; border-radius: 11px; background: var(--navy); color: #fff; font-family: Vazirmatn, sans-serif; font-weight: 600; font-size: 13px; transition: background .2s; }
  .wz-inv-copy.ok { background: #1F8A5B; }
  .wz-inv-chans { display: flex; gap: 10px; width: 100%; margin-top: 14px; }
  .wz-inv-chan { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px 6px; border-radius: 16px; border: 1px solid var(--line); background: var(--card); cursor: pointer; font-family: Vazirmatn, sans-serif; }
  .wz-inv-chic { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .wz-inv-chtx { font-size: 12.5px; font-weight: 600; color: var(--navy); }

  /* weaving + ready */
  .wz-weave { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .wz-weave-dots { display: flex; gap: 8px; margin-top: 26px; }
  .wz-weave-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--peri); animation: wzDot 1.2s ease-in-out infinite; }
  .wz-weave-dots span:nth-child(2) { animation-delay: .2s; }
  .wz-weave-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes wzDot { 0%,100% { opacity: .3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-5px); } }
  .wz-check { width: 76px; height: 76px; border-radius: 50%; background: linear-gradient(150deg, #1F8A5B, #34A56F); display: flex; align-items: center; justify-content: center; box-shadow: 0 18px 40px -12px rgba(31,138,91,.5); }

  /* home tour (coach-marks over real Home) */
  .wz-tour { background: #F4F4F1; overflow: hidden; }
  .wz-tour-home { position: absolute; inset: 0; }
  .wz-tour-home * { pointer-events: none !important; }
  .wz-tour-catch { position: absolute; inset: 0; z-index: 2; }
  .wz-tour-ring { position: absolute; z-index: 3; pointer-events: none; border: 2px solid rgba(255,255,255,.92); box-shadow: 0 0 0 9999px rgba(15,17,32,.62); transition: top .35s cubic-bezier(.4,0,.2,1), left .35s cubic-bezier(.4,0,.2,1), width .35s cubic-bezier(.4,0,.2,1), height .35s cubic-bezier(.4,0,.2,1), border-radius .35s; }
  .wz-tour-card { position: absolute; left: 24px; right: 24px; z-index: 4; background: #fff; border-radius: 18px; padding: 18px 20px 16px; box-shadow: 0 20px 54px -14px rgba(10,12,30,.55); transition: top .35s cubic-bezier(.4,0,.2,1), bottom .35s cubic-bezier(.4,0,.2,1); }
  .wz-tour-dots { display: flex; gap: 5px; margin-bottom: 12px; }
  .wz-tour-dots span { width: 6px; height: 6px; border-radius: 50%; background: #D8D8DE; transition: background .25s, width .25s; }
  .wz-tour-dots span.on { width: 18px; border-radius: 3px; background: var(--navy); }
  .wz-tour-title { font-family: Dosis, sans-serif; font-weight: 700; font-size: 19px; color: #1A1C29; }
  .wz-tour-body { font-family: Vazirmatn, sans-serif; font-size: 13.5px; line-height: 1.5; color: #6E6E76; margin-top: 5px; }
  .wz-tour-actions { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
  .wz-tour-skip { border: none; background: transparent; cursor: pointer; font-family: Vazirmatn, sans-serif; font-size: 14px; color: #9A9A9A; margin-right: auto; }
  .wz-tour-next { margin-left: auto; border: none; cursor: pointer; background: var(--navy); color: #fff; font-family: Vazirmatn, sans-serif; font-weight: 600; font-size: 14px; padding: 11px 22px; border-radius: 100px; transition: transform .1s; }
  .wz-tour-next:active { transform: scale(.96); }
  @media (prefers-reduced-motion: reduce) {
    .wz-orb-core, .wz-orb-ring, .wz-weave-dots span { animation: none !important; }
  }

  /* ── motion (resting state visible; .pre holds the pre-entrance state) ── */
  .mira-rise { opacity: 1; transform: none; transition: opacity 0.5s cubic-bezier(.2,.7,.3,1), transform 0.5s cubic-bezier(.2,.7,.3,1); }
  .mira-rise.pre { opacity: 0; transform: translateY(10px); }
  @keyframes miraBreathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }
  @keyframes orbBlobA { 0%,100% { transform: translate(-6%,4%) scale(0.85); opacity: 0.4; } 50% { transform: translate(26%,-14%) scale(1.25); opacity: 0.95; } }
  @keyframes orbBlobB { 0%,100% { transform: translate(6%,-4%) scale(1.1); opacity: 0.35; } 50% { transform: translate(-22%,18%) scale(0.72); opacity: 0.85; } }
  @keyframes orbBlobC { 0%,100% { transform: translate(0,-6%) scale(0.8); opacity: 0.5; } 50% { transform: translate(16%,20%) scale(1.3); opacity: 0.9; } }

  @media (prefers-reduced-motion: reduce) {
    .mira-rise, .mira-page { transition: none !important; }
    .mira-rise.pre { opacity: 1 !important; transform: none !important; }
    .mira-page.is-entering { opacity: 1 !important; transform: none !important; }
    .mira-orb-img, .mira-orb-blob { animation: none !important; }
    .rd-orb, .rd-orb-ring { animation: none !important; }
  }

  /* ── redesigned home ─────────────────────────────────────── */
  .rd-home { position: absolute; inset: 0; display: flex; flex-direction: column; background: #F4F4F1; }
  .rd-header { padding: 62px 26px 0; display: flex; align-items: flex-start; justify-content: space-between; }
  .rd-eyebrow { font-family: Vazirmatn, sans-serif; font-size: 13px; font-weight: 500; color: #8A8B92; letter-spacing: .2px; }
  .rd-name { font-family: Dosis, sans-serif; font-weight: 600; font-size: 22px; color: #1B1C24; line-height: 1.1; margin-top: 2px; }
  .rd-gear { width: 42px; height: 42px; border-radius: 50%; background: #FBFBF9; box-shadow: inset 0 0 0 1px #E9E9E4; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: transform .12s ease; }
  .rd-gear:active { transform: scale(.92); }

  .rd-hero { padding: 22px 26px 0; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .rd-orb { position: relative; width: 74px; height: 74px; border-radius: 50%;
    background: radial-gradient(circle at 36% 30%, #aeb9e8 0%, #8b98d6 42%, #6472b6 100%);
    box-shadow: 0 18px 40px -14px rgba(90,105,180,.55), inset 0 2px 6px rgba(255,255,255,.5);
    animation: rdBreathe 6s ease-in-out infinite; }
  .rd-orb::after { content: ""; position: absolute; inset: 10px; border-radius: 50%; background: radial-gradient(circle at 62% 66%, rgba(255,255,255,.35), rgba(255,255,255,0) 55%); }
  .rd-orb-ring { position: absolute; inset: -12px; border-radius: 50%; border: 1px solid rgba(126,139,201,.28); animation: rdPulse 6s ease-in-out infinite; }
  .rd-title { font-family: Dosis, sans-serif; font-weight: 700; font-size: 24px; line-height: 1.22; color: #1B1C24; margin: 18px 0 0; letter-spacing: .2px; }

  .rd-capture { margin: 22px 26px 0; }
  .rd-field { width: 100%; display: flex; align-items: center; gap: 12px; height: 62px; padding: 0 8px 0 20px; background: #FBFBF9; border: none; border-radius: 20px; box-shadow: 0 6px 22px -14px rgba(30,34,70,.30), inset 0 0 0 1px #E9E9E4; cursor: pointer; text-align: left; transition: transform .12s ease; }
  .rd-field:active { transform: scale(.99); }
  .rd-ph { flex: 1; font-family: Vazirmatn, sans-serif; font-size: 15px; color: #B7B8BE; }
  .rd-mic { width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0; background: radial-gradient(circle at 38% 30%, #3a5ad0, #14328C); box-shadow: 0 8px 18px -6px rgba(20,50,140,.55); display: flex; align-items: center; justify-content: center; }

  .rd-recents { margin: 26px 26px 0; }

  .rd-label { display: flex; align-items: center; gap: 8px; font-family: Vazirmatn, sans-serif; font-size: 12px; font-weight: 600; color: #B7B8BE; text-transform: uppercase; letter-spacing: 1px; }
  .rd-dot { width: 6px; height: 6px; border-radius: 50%; background: #7E8BC9; }
  .rd-see { border: none; background: none; cursor: pointer; font-family: Vazirmatn, sans-serif; font-size: 12px; font-weight: 600; color: #7E8BC9; }
  .rd-list { position: relative; }
  .rd-list::before { content: ""; position: absolute; left: 5.5px; top: 22px; bottom: 22px; width: 1.5px; background: linear-gradient(#EDEFF8, #7E8BC9 30%, #7E8BC9 70%, #EDEFF8); opacity: .7; }
  .rd-item { position: relative; display: flex; gap: 16px; align-items: flex-start; padding: 13px 0; cursor: pointer; width: 100%; border: none; background: none; text-align: left; }
  .rd-item:not(:last-child) { box-shadow: inset 0 -1px 0 #E9E9E4; }

  .rd-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .rd-rtitle { font-family: Vazirmatn, sans-serif; font-size: 14px; font-weight: 500; line-height: 1.4; color: #1B1C24; }

  .rd-meta svg { color: #7E8BC9; flex-shrink: 0; }

  .rd-spacer { flex: 1; }

  .rd-navitem { display: flex; flex-direction: column; align-items: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 6px; font-family: Vazirmatn, sans-serif; font-size: 11px; font-weight: 500; color: #B7B8BE; transition: color .15s ease; }
  .rd-navitem.is-active { color: #14328C; }
  .rd-navspacer { width: 64px; }
  .rd-navmic { position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%); width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer;
    background: radial-gradient(circle at 38% 30%, #8b98d6, #5b69ad);
    box-shadow: 0 14px 28px -8px rgba(70,85,150,.6), inset 0 2px 4px rgba(255,255,255,.4);

  @keyframes rdBreathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  /* ── Canvas (spatial board) ─────────────────────────────── */
  .rd-canvas .rd-nav { position: absolute; left: 0; right: 0; bottom: 0; z-index: 35; }
  .rd-canvas { position: absolute; inset: 0;
    --c-bg: #F4F4F1; --c-card: #FBFBF9; --c-ink: #1B1C24; --c-muted: #8A8B92; --c-faint: #B7B8BE;
    --c-navy: #14328C; --c-peri: #7E8BC9; --c-peri-soft: #EDEFF8; --c-line: #E9E9E4;
    --bg: #F4F4F1; --card: #FBFBF9; --ink: #1B1C24; --muted: #8A8B92; --faint: #B7B8BE;
    --navy: #14328C; --peri: #7E8BC9; --peri-soft: #EDEFF8; --line: #E9E9E4; }

  /* Canvas mode toggle + shared header */
  .cv-modebar { position: absolute; top: 54px; left: 0; right: 0; z-index: 38; display: flex; flex-direction: column; align-items: center; gap: 7px; pointer-events: none; }
  .cv-seg { pointer-events: auto; display: flex; gap: 3px; padding: 4px; border-radius: 100px; background: rgba(251,251,249,.9); backdrop-filter: blur(10px); box-shadow: 0 8px 22px -10px rgba(20,22,40,.35), inset 0 0 0 1px var(--c-line); }
  .cv-seg button { border: none; background: none; cursor: pointer; height: 30px; padding: 0 16px; border-radius: 100px; font-family: Vazirmatn, sans-serif; font-size: 12.5px; font-weight: 600; color: var(--c-muted); display: inline-flex; align-items: center; gap: 6px; transition: background .15s ease, color .15s ease; }
  .cv-seg button.on { background: var(--c-navy); color: #fff; }
  .cv-context { pointer-events: none; font-size: 12px; font-weight: 500; color: var(--c-muted); background: rgba(244,244,241,.7); padding: 2px 10px; border-radius: 100px; }

  /* Map (memory graph) */
  .g-canvas { position: absolute; inset: 0; overflow: hidden; touch-action: none; }
  .g-pan { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transition: transform .5s cubic-bezier(.2,.7,.2,1); }
  .g-edges { position: absolute; left: 0; top: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
  .g-edges .edge { stroke: var(--peri); stroke-width: 1.4; opacity: .28; transition: opacity .35s ease, stroke-width .35s ease; }
  .g-edges .edge.hot { opacity: .9; stroke-width: 2; }
  .g-edges .edge.dim { opacity: .08; }
  .gnode { position: absolute; transform: translate(-50%, -50%); cursor: pointer; transition: opacity .35s ease; }
  .gnode-inner { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .gnode.dim { opacity: .28; }
  .gnode .disc { position: relative; border-radius: 50%; background: var(--card); box-shadow: inset 0 0 0 1px var(--line), 0 6px 16px -8px rgba(30,34,70,.25); display: flex; align-items: center; justify-content: center; color: var(--peri); transition: transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease; }
  .gnode:active .disc { transform: scale(.94); }
  .gnode.sel .disc { box-shadow: inset 0 0 0 2px var(--peri), 0 12px 26px -8px rgba(90,105,180,.5); transform: scale(1.06); }
  .gnode.s-hub .disc { width: 68px; height: 68px; }
  .gnode.s-mid .disc { width: 52px; height: 52px; }
  .gnode.s-sm .disc { width: 44px; height: 44px; }

  /* voice player */

  .md-play { flex: 0 0 auto; width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; background: radial-gradient(circle at 36% 30%, #4a6ad8, #14328C 78%); box-shadow: 0 8px 18px -8px rgba(20,50,140,.6); transition: transform .12s; }
  .md-play:active { transform: scale(.94); }
  .md-wave { flex: 1; display: flex; align-items: center; gap: 2.5px; height: 48px; cursor: pointer; }
  .md-bar { flex: 1; border-radius: 2px; background: #D6D9E6; transition: background .15s; }
  .md-bar.on { background: var(--peri); }
  .md-player-meta { flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .md-ptime { font-size: 11.5px; font-weight: 600; color: #6A6C78; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .md-speed { border: none; cursor: pointer; padding: 3px 9px; border-radius: 100px; background: #EEF0F9; color: var(--navy); font-family: Vazirmatn, sans-serif; font-weight: 700; font-size: 11px; }
  .md-speed:active { transform: scale(.95); }
  .md-transcript { margin-top: 14px; padding: 16px; border-radius: 16px; background: #FBFBF9; box-shadow: inset 0 0 0 1px var(--line); }
  .md-tr-label { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 11.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--peri); }
  .md-tr-text { margin: 0; font-family: Vazirmatn, sans-serif; font-size: 15.5px; line-height: 1.64; color: #34353E; }
  .md-orb-sm { width: 15px; height: 15px; }

  /* ⋯ action menu */
  .md-more-wrap { position: relative; }
  .md-menu-catch { position: fixed; inset: 0; z-index: 40; }
  .md-menu { position: absolute; top: 44px; right: 0; z-index: 41; width: 194px; padding: 6px; border-radius: 15px; background: #FFFFFF; box-shadow: 0 18px 44px -12px rgba(20,26,50,.28), inset 0 0 0 1px var(--line); transform-origin: top right; animation: mdMenu .16s cubic-bezier(.2,.8,.3,1); }
  @keyframes mdMenu { from { opacity: 0; transform: scale(.94) translateY(-4px); } to { opacity: 1; transform: none; } }
  .md-menu-item { width: 100%; display: flex; align-items: center; gap: 11px; padding: 11px 12px; border: none; background: transparent; border-radius: 10px; cursor: pointer; font-family: Vazirmatn, sans-serif; font-weight: 500; font-size: 14px; color: var(--ink); text-align: left; transition: background .13s; }
  .md-menu-item:hover { background: rgba(20,50,140,.06); }
  .md-menu-item svg { color: var(--muted); flex-shrink: 0; }
  .md-menu-item.is-danger { color: #C0392B; }
  .md-menu-item.is-danger svg { color: #C0392B; }
  .md-menu-item.is-danger:hover { background: rgba(192,57,43,.08); }
  .md-menu-sep { height: 1px; margin: 5px 8px; background: var(--line); }

  /* delete confirm sheet */
  .md-overlay { position: absolute; inset: 0; z-index: 60; display: flex; flex-direction: column; justify-content: flex-end; }
  .md-scrim { position: absolute; inset: 0; background: rgba(17,20,38,.42); backdrop-filter: blur(2px); animation: mdFade .22s ease; }
  @keyframes mdFade { from { opacity: 0; } to { opacity: 1; } }
  .md-sheet { position: relative; z-index: 1; padding: 12px 24px calc(26px + env(safe-area-inset-bottom)); border-radius: 26px 26px 0 0; background: #FBFBF9; text-align: center; animation: mdRise .3s cubic-bezier(.2,.8,.3,1); }
  @keyframes mdRise { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .md-sheet-grab { display: block; width: 40px; height: 4px; margin: 0 auto 18px; border-radius: 100px; background: #DEDEE4; }
  .md-sheet-ic { width: 54px; height: 54px; margin: 0 auto; border-radius: 50%; background: #FBEAE7; color: #C0392B; display: flex; align-items: center; justify-content: center; }
  .md-sheet-title { margin: 16px 0 0; font-family: Dosis, sans-serif; font-weight: 700; font-size: 21px; color: var(--ink); }
  .md-sheet-text { margin: 9px auto 0; max-width: 280px; font-size: 13.5px; line-height: 1.55; color: #64656F; }
  .md-sheet-text b { color: var(--ink); font-weight: 600; }
  .md-sheet-danger { width: 100%; height: 52px; margin-top: 22px; border-radius: 14px; border: none; cursor: pointer; background: #C0392B; color: #fff; font-family: Vazirmatn, sans-serif; font-weight: 600; font-size: 15px; transition: filter .15s, transform .1s; }
  .md-sheet-danger:hover { filter: brightness(1.06); }
  .md-sheet-danger:active { transform: scale(.98); }
  .md-sheet-cancel { width: 100%; height: 48px; margin-top: 8px; border: none; background: transparent; cursor: pointer; font-family: Vazirmatn, sans-serif; font-weight: 600; font-size: 14.5px; color: var(--muted); }

  /* leaving: fold the memory away calmly */
  .rd-memory.is-deleting .md-scroll { transition: opacity .5s ease, transform .5s cubic-bezier(.4,0,.2,1); opacity: 0; transform: scale(.97); transform-origin: top center; }
  .rd-memory.is-deleting .md-head, .rd-memory.is-deleting .md-actions { transition: opacity .35s ease; opacity: 0; }

  /* ── Ask Mira chat ─────────────────────────────────────────── */
  .rd-chat { position: absolute; inset: 0; display: flex; flex-direction: column;
    --bg: #F4F4F1; --card: #FBFBF9; --ink: #1B1C24; --navy: #14328C; --peri: #7E8BC9; --muted: #8A8B92; --faint: #B7B8BE; --line: rgba(20,24,45,.07);
    background: var(--bg); font-family: Vazirmatn, sans-serif; overflow: hidden; }
  .rd-chat .ch-head { flex: 0 0 auto; display: flex; align-items: center; gap: 12px; padding: 54px 18px 14px; background: var(--bg); }
  .ch-icbtn { flex: 0 0 auto; width: 40px; height: 40px; border-radius: 12px; border: none; cursor: pointer; background: var(--card); box-shadow: inset 0 0 0 1px var(--line); color: #3A3B45; display: flex; align-items: center; justify-content: center; }
  .ch-icbtn:hover { box-shadow: inset 0 0 0 1.4px rgba(126,139,201,.5); }
  .ch-head-tx { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .ch-head-t { font-family: Dosis, sans-serif; font-weight: 700; font-size: 19px; color: var(--ink); line-height: 1; }
  .ch-head-s { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-ctx-ic { display: inline-flex; color: var(--peri); flex: 0 0 auto; }

  .ch-scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 20px 18px; display: flex; flex-direction: column; gap: 16px; }
  .ch-scroll::-webkit-scrollbar { width: 0; }
  .ch-row { display: flex; }
  .ch-row-me { justify-content: flex-end; }
  .ch-row-mira { gap: 10px; align-items: flex-start; }
  .ch-me { max-width: 76%; padding: 11px 15px; border-radius: 18px 18px 5px 18px; background: var(--navy); color: #fff; font-size: 14px; line-height: 1.5; box-shadow: 0 4px 14px rgba(20,50,140,.18); }
  .ch-orb { flex: 0 0 auto; width: 26px; height: 26px; margin-top: 2px; border-radius: 50%; background: radial-gradient(circle at 34% 30%, #9AA6D8, #3F4E9E 74%); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(63,78,158,.32); }
  .ch-orb-ring { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,.9); box-shadow: 0 0 0 3px rgba(255,255,255,.28); }
  .ch-mira { max-width: 82%; }
  .ch-mira-tx { margin: 0; padding: 12px 15px; border-radius: 5px 18px 18px 18px; background: var(--card); box-shadow: inset 0 0 0 1px var(--line); color: #262832; font-size: 14px; line-height: 1.55; }
  .ch-cites { margin-top: 9px; display: flex; flex-direction: column; gap: 7px; }
  .ch-cites-lead { font-size: 10.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--faint); margin-bottom: 1px; }
  .ch-cite { display: flex; align-items: center; gap: 11px; width: 100%; padding: 9px 11px; border-radius: 13px; border: none; cursor: pointer; background: var(--card); box-shadow: inset 0 0 0 1px var(--line); text-align: left; }
  .ch-cite:hover { box-shadow: inset 0 0 0 1.4px rgba(126,139,201,.5); }
  .ch-cite-ic { flex: 0 0 auto; width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .ch-ic-event { background: #EAF0FF; color: #3B5BD0; }
  .ch-ic-photo { background: #EDE9FB; color: #6D5BC0; }
  .ch-ic-note { background: #E9F3EE; color: #2E8A5F; }
  .ch-ic-voice { background: #FBEDF0; color: #C05B78; }
  .ch-cite-tx { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .ch-cite-t { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-cite-s { font-size: 11px; color: var(--muted); }
  .ch-remind { margin-top: 10px; display: inline-flex; align-items: center; gap: 8px; padding: 10px 15px; border-radius: 999px; border: none; cursor: pointer; background: var(--navy); color: #fff; font-family: inherit; font-size: 13px; font-weight: 600; }
  .ch-remind:hover { filter: brightness(1.07); }
  .ch-remind.done { background: #E7F3EC; color: var(--green, #1F8A5B); box-shadow: inset 0 0 0 1px rgba(31,138,91,.3); cursor: default; filter: none; }

  .ch-typing { display: inline-flex; gap: 5px; padding: 15px 16px; }
  .ch-typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--peri); opacity: .5; animation: chDot 1.1s infinite ease-in-out; }
  .ch-typing span:nth-child(2) { animation-delay: .18s; }
  .ch-typing span:nth-child(3) { animation-delay: .36s; }
  @keyframes chDot { 0%,100% { opacity: .35; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-3px); } }

  .ch-suggest { display: flex; flex-wrap: wrap; gap: 8px; padding: 2px 0 0 36px; }
  .ch-chip { padding: 9px 14px; border-radius: 999px; border: none; cursor: pointer; background: var(--card); box-shadow: inset 0 0 0 1px rgba(126,139,201,.4); color: var(--navy); font-family: inherit; font-size: 13px; font-weight: 600; }
  .ch-chip:hover { background: #EEF0F9; }

  .ch-compose { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; padding: 12px 18px calc(16px + env(safe-area-inset-bottom)); background: var(--bg); box-shadow: 0 -1px 0 var(--line); }
  .ch-input { flex: 1; height: 48px; padding: 0 18px; border: none; border-radius: 24px; background: var(--card); box-shadow: inset 0 0 0 1px var(--line); outline: none; font-family: inherit; font-size: 14px; color: var(--ink); }
  .ch-input::placeholder { color: var(--faint); }
  .ch-input:focus { box-shadow: inset 0 0 0 1.5px var(--peri); }
  .ch-send, .ch-mic { flex: 0 0 auto; width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .ch-send { background: var(--navy); color: #fff; box-shadow: 0 4px 14px rgba(20,50,140,.24); }
  .ch-send:hover { filter: brightness(1.07); }
  .ch-mic { background: var(--card); box-shadow: inset 0 0 0 1px var(--line); color: var(--navy); }
  .ch-mic:hover { box-shadow: inset 0 0 0 1.4px rgba(126,139,201,.5); }

  /* ── Library ─────────────────────────────────────────────── */
  .rd-library { position: absolute; inset: 0;
    --bg: #F4F4F1; --card: #FBFBF9; --ink: #1B1C24; --muted: #8A8B92; --faint: #B7B8BE;
    --navy: #14328C; --peri: #7E8BC9; --peri-soft: #EDEFF8; --line: #E9E9E4; }
  .rd-library .lb-scroll { position: absolute; inset: 0; overflow-y: auto; scrollbar-width: none; padding-bottom: 120px; }
  .rd-library .lb-scroll::-webkit-scrollbar { display: none; }
  .rd-library .rd-nav { position: absolute; left: 0; right: 0; bottom: 0; z-index: 20; }
  .rd-library .lb-head { padding: 60px 26px 0; }
  .rd-library .lb-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--peri); }
  .rd-library .lb-titlerow { display: flex; align-items: flex-start; justify-content: space-between; margin-top: 6px; }
  .rd-library .lb-title { font-family: Dosis, sans-serif; font-weight: 700; font-size: 30px; color: var(--ink); line-height: 1.05; }
  .rd-library .lb-title small { display: block; font-family: Vazirmatn; font-weight: 500; font-size: 13px; color: var(--muted); margin-top: 4px; }
  .rd-library .lb-gear { width: 42px; height: 42px; border-radius: 50%; background: var(--card); box-shadow: inset 0 0 0 1px var(--line); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; flex-shrink: 0; }
  .rd-library .lb-search { margin: 20px 26px 0; display: flex; align-items: center; gap: 11px; height: 50px; padding: 0 16px; border-radius: 16px; background: var(--card); box-shadow: inset 0 0 0 1px var(--line); cursor: text; }
  .rd-library .lb-search input { flex: 1; border: none; background: none; outline: none; font-family: Vazirmatn, sans-serif; font-size: 15px; color: var(--ink); }
  .rd-library .lb-search input::placeholder { color: var(--faint); }
  .rd-library .lb-search .voice { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; border: none; cursor: pointer; background: var(--peri-soft); color: var(--navy); display: flex; align-items: center; justify-content: center; }
  .rd-library .lb-filters { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 18px 26px 4px; }
  .rd-library .lb-filters::-webkit-scrollbar { display: none; }
  .rd-library .chip { flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 14px; border-radius: 100px; border: none; cursor: pointer; background: var(--card); box-shadow: inset 0 0 0 1px var(--line); color: var(--muted); font-family: Vazirmatn, sans-serif; font-size: 13px; font-weight: 500; transition: background .15s ease, color .15s ease, box-shadow .15s ease; }
  .rd-library .chip svg { flex-shrink: 0; }
  .rd-library .chip.on { background: var(--navy); color: #fff; box-shadow: none; }
  .rd-library .chip.on svg { stroke: #fff; }
  .rd-library .lb-seclabel { display: flex; align-items: center; justify-content: space-between; padding: 26px 26px 12px; }
  .rd-library .lb-seclabel .l { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--faint); }
  .rd-library .lb-seclabel .l .ic { color: var(--peri); display: flex; }
  .rd-library .lb-seclabel .see { border: none; background: none; cursor: pointer; font-family: Vazirmatn, sans-serif; font-size: 12.5px; font-weight: 600; color: var(--peri); }
  .rd-library .coll-row { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; padding: 0 26px 4px; }
  .rd-library .coll-row::-webkit-scrollbar { display: none; }
  .rd-library .coll { flex-shrink: 0; width: 150px; padding: 16px; border-radius: 18px; cursor: pointer; box-shadow: inset 0 0 0 1px var(--line); position: relative; overflow: hidden; transition: transform .12s ease; }
  .rd-library .coll:active { transform: scale(.98); }
  .rd-library .coll.c1 { background: linear-gradient(155deg, #EEF1FA, #E3E8F6); }
  .rd-library .coll.c2 { background: linear-gradient(155deg, #F0EEF7, #E8E3F2); }
  .rd-library .coll.c3 { background: linear-gradient(155deg, #EAF1EE, #DFEDE6); }
  .rd-library .coll-ic { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,.7); color: var(--navy); }
  .rd-library .coll-nm { font-family: Dosis, sans-serif; font-weight: 700; font-size: 17px; color: var(--ink); margin-top: 40px; }
  .rd-library .coll-ct { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .rd-library .day-label { padding: 24px 26px 4px; font-size: 12px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--faint); }
  .rd-library .mem { display: flex; gap: 13px; margin: 8px 20px 0; padding: 15px 16px; border-radius: 18px; background: var(--card); box-shadow: inset 0 0 0 1px var(--line); cursor: pointer; transition: transform .12s ease, box-shadow .15s ease; text-align: left; width: calc(100% - 40px); border: none; font-family: Vazirmatn, sans-serif; }
  .rd-library .mem:active { transform: scale(.99); }
  .rd-library .mem:hover { box-shadow: inset 0 0 0 1px var(--peri-soft), 0 8px 20px -14px rgba(30,34,70,.4); }
  .rd-library .mem-ic { width: 44px; height: 44px; border-radius: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .rd-library .mem-ic.note { background: var(--peri-soft); color: var(--navy); }
  .rd-library .mem-ic.voice { background: #E7EFEA; color: #2E7D4F; }
  .rd-library .mem-ic.link { background: #FBEFE7; color: #B65A2E; }
  .rd-library .mem-ic.event { background: #EAE7F6; color: #5B4B9E; }
  .rd-library .mem-ic.photo { position: relative; overflow: hidden; background: linear-gradient(150deg,#1b2b6b,#0f1c4d); color: #fff; }
  .rd-library .mem-ic.photo::after { content:""; position: absolute; inset: 0; background: radial-gradient(circle at 68% 28%, rgba(223,184,119,.5), transparent 60%); }
  .rd-library .mem-ic.photo svg { position: relative; z-index: 1; }
  .rd-library .mem-body { flex: 1; min-width: 0; }
  .rd-library .mem-t { font-size: 14.5px; font-weight: 600; color: var(--ink); line-height: 1.35; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rd-library .mem-s { font-size: 12.5px; color: var(--muted); line-height: 1.45; margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .rd-library .mem-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .rd-library .mem-tp { display: inline-flex; align-items: center; gap: 5px; height: 21px; padding: 0 8px; border-radius: 100px; background: var(--peri-soft); color: var(--navy); font-size: 10px; font-weight: 600; letter-spacing: .2px; }
  .rd-library .mem-time { font-size: 11.5px; color: var(--faint); }
  .rd-library .mem-links { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; color: var(--peri); font-weight: 500; }
  .rd-library .mem-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--faint); }
  .rd-library .hl { background: rgba(126,139,201,.28); color: var(--navy); border-radius: 4px; padding: 0 2px; font-weight: 600; }
  .rd-library .sr-head { padding: 20px 26px 4px; display: flex; align-items: baseline; justify-content: space-between; }
  .rd-library .sr-count { font-size: 13px; color: var(--muted); }
  .rd-library .sr-count b { font-weight: 600; color: var(--ink); }
  .rd-library .sr-clear { border: none; background: none; cursor: pointer; font-family: Vazirmatn, sans-serif; font-size: 12.5px; font-weight: 600; color: var(--peri); padding: 0; }
  .rd-library .lb-end { text-align: center; font-size: 12.5px; color: var(--faint); padding: 28px 40px 0; line-height: 1.5; }
  .rd-library .empty-hint { text-align: center; padding: 40px 40px 0; color: var(--faint); font-size: 13.5px; line-height: 1.5; }

  /* Library selection mode */
  .rd-library .mem-check { display: none; width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; align-self: center; background: #fff; box-shadow: inset 0 0 0 1.8px var(--faint); align-items: center; justify-content: center; transition: background .15s ease, box-shadow .15s ease; }
  .rd-library .mem-check svg { opacity: 0; transition: opacity .15s ease; }
  .rd-library.selecting .mem-check { display: flex; }
  .rd-library .mem.sel { box-shadow: inset 0 0 0 1.5px var(--peri); background: var(--peri-soft); }
  .rd-library .mem.sel .mem-check { background: var(--navy); box-shadow: none; }
  .rd-library .mem.sel .mem-check svg { opacity: 1; }
  .rd-library.selecting .lb-head, .rd-library.selecting .lb-search, .rd-library.selecting .lb-filters,
  .rd-library.selecting .lb-seclabel, .rd-library.selecting .coll-row, .rd-library.selecting .sr-head, .rd-library.selecting .lb-end { display: none !important; }
  .rd-library.selecting .lb-scroll { padding-top: 96px; }
  .rd-library.selecting .day-label:first-child { padding-top: 6px; }
  .rd-library .sel-bar { position: absolute; top: 0; left: 0; right: 0; z-index: 45; padding: 54px 20px 14px; display: flex; align-items: center; gap: 12px; background: var(--bg); box-shadow: 0 1px 0 var(--line); }
  .rd-library .sel-x { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; border: none; cursor: pointer; background: var(--card); box-shadow: inset 0 0 0 1px var(--line); display: flex; align-items: center; justify-content: center; }
  .rd-library .sel-count { flex: 1; font-family: Dosis, sans-serif; font-weight: 700; font-size: 20px; color: var(--ink); }
  .rd-library .sel-all { border: none; background: none; cursor: pointer; font-family: Vazirmatn, sans-serif; font-size: 13px; font-weight: 600; color: var(--peri); padding: 8px; }
  .rd-library .sel-actions { position: absolute; left: 0; right: 0; bottom: 0; z-index: 46; display: flex; gap: 6px; padding: 12px 16px 22px; background: rgba(251,251,249,.92); backdrop-filter: blur(10px); box-shadow: 0 -1px 0 var(--line); }
  .rd-library .sa { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 8px 4px; border: none; cursor: pointer; background: none; font-family: Vazirmatn, sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); border-radius: 12px; transition: background .15s ease; }
  .rd-library .sa:hover { background: var(--peri-soft); }
