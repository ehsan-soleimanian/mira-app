<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mira — Memory Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #F4F4F1; --card: #FBFBF9; --ink: #1B1C24; --muted: #8A8B92; --faint: #B7B8BE;
    --navy: #14328C; --peri: #7E8BC9; --peri-soft: #EDEFF8; --line: #E9E9E4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: radial-gradient(1200px 800px at 50% -12%, #ffffff 0%, #ececeb 60%, #e4e4e6 100%);
    font-family: Vazirmatn, -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #stage { transform-origin: center center; }

  .bezel { width: 419px; height: 878px; padding: 13px; border-radius: 56px;
    background: linear-gradient(150deg,#2b2c30 0%,#46474c 18%,#1d1e21 40%,#3a3b40 70%,#232427 100%);
    box-shadow: 0 50px 100px -20px rgba(20,22,40,.45), 0 18px 40px -16px rgba(20,22,40,.35), inset 0 0 0 1.5px rgba(255,255,255,.10), inset 0 0 2px 2px rgba(0,0,0,.5); }
  .screen { position: relative; width: 393px; height: 852px; border-radius: 44px; overflow: hidden; background: var(--bg); display: flex; flex-direction: column; }
  .island { position: absolute; top: 11px; left: 50%; transform: translateX(-50%); width: 124px; height: 36px; border-radius: 20px; background: #000; z-index: 50; }
  .statusbar { position: absolute; top: 0; left: 0; right: 0; height: 48px; z-index: 40; display: flex; align-items: center; justify-content: space-between; padding: 16px 32px 0; }
  .clock { font-family: -apple-system, system-ui; font-weight: 600; font-size: 15px; color: var(--ink); }
  .home-indicator { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 139px; height: 5px; border-radius: 100px; background: rgba(0,0,0,.28); z-index: 60; }

  /* header */
  .g-header { position: relative; z-index: 20; padding: 60px 24px 0; }
  .g-titlerow { display: flex; align-items: center; justify-content: space-between; }
  .g-title { font-family: Dosis, sans-serif; font-weight: 600; font-size: 24px; color: var(--ink); }
  .g-title small { display: block; font-family: Vazirmatn; font-weight: 500; font-size: 12.5px; color: var(--muted); margin-top: 2px; letter-spacing: .2px; }
  .g-icbtn { width: 42px; height: 42px; border-radius: 50%; background: var(--card); box-shadow: inset 0 0 0 1px var(--line); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: transform .12s ease; }
  .g-icbtn:active { transform: scale(.92); }
  .g-filters { display: flex; gap: 8px; margin-top: 16px; overflow-x: auto; scrollbar-width: none; }
  .g-filters::-webkit-scrollbar { display: none; }
  .fchip { flex-shrink: 0; height: 32px; padding: 0 14px; border-radius: 100px; border: none; cursor: pointer; font-family: Vazirmatn; font-size: 13px; font-weight: 500; color: var(--muted); background: transparent; box-shadow: inset 0 0 0 1px var(--line); transition: all .15s ease; display: inline-flex; align-items: center; gap: 6px; }
  .fchip.is-active { background: var(--navy); color: #fff; box-shadow: none; }

  /* graph canvas */
  .g-canvas { position: relative; flex: 1; overflow: hidden; touch-action: none; }
  .g-pan { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transition: transform .5s cubic-bezier(.2,.7,.2,1); }
  .g-edges { position: absolute; left: 0; top: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
  .edge { stroke: var(--peri); stroke-width: 1.4; opacity: .28; transition: opacity .35s ease, stroke-width .35s ease; }
  .edge.hot { opacity: .9; stroke-width: 2; }
  .edge.dim { opacity: .08; }

  .node { position: absolute; transform: translate(-50%, -50%); cursor: pointer; transition: opacity .35s ease; }
  .node-inner { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .node.dim { opacity: .28; }
  .node .disc { position: relative; border-radius: 50%; background: var(--card); box-shadow: inset 0 0 0 1px var(--line), 0 6px 16px -8px rgba(30,34,70,.25); display: flex; align-items: center; justify-content: center; color: var(--peri); transition: transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease; }
  .node:active .disc { transform: scale(.94); }
  .node.sel .disc { box-shadow: inset 0 0 0 2px var(--peri), 0 12px 26px -8px rgba(90,105,180,.5); transform: scale(1.06); }
  /* sizes */
  .node.s-hub .disc { width: 68px; height: 68px; }
  .node.s-mid .disc { width: 52px; height: 52px; }
  .node.s-sm  .disc { width: 44px; height: 44px; }
  /* person hub filled */
  .node.t-person .disc { background: radial-gradient(circle at 36% 30%, #aeb9e8, #7482c2 70%); box-shadow: 0 12px 26px -10px rgba(90,105,180,.55), inset 0 2px 6px rgba(255,255,255,.4); color: #fff; }
  .node.t-person.pulse .disc { animation: breathe 5s ease-in-out infinite; }
  /* topic dashed */
  .node.t-topic .disc { background: var(--peri-soft); box-shadow: inset 0 0 0 1.5px rgba(126,139,201,.5); color: var(--navy); }
  .node .lbl { font-size: 11.5px; font-weight: 500; color: var(--ink); max-width: 84px; text-align: center; line-height: 1.25; text-wrap: balance; }
  .node.s-hub .lbl { font-weight: 600; font-size: 12.5px; }
  .node .initial { font-family: Dosis, sans-serif; font-weight: 700; font-size: 24px; }

  /* detail card */
  .g-detail { position: absolute; left: 14px; right: 14px; bottom: 96px; z-index: 30; background: var(--card); border-radius: 24px; padding: 18px; box-shadow: 0 24px 50px -20px rgba(20,22,40,.4), inset 0 0 0 1px var(--line); transform: translateY(140%); opacity: 0; transition: transform .4s cubic-bezier(.2,.7,.2,1), opacity .3s ease; }
  .g-detail.show { transform: none; opacity: 1; }
  .gd-top { display: flex; align-items: center; gap: 13px; }
  .gd-ic { width: 46px; height: 46px; border-radius: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--peri-soft); color: var(--navy); }
  .gd-ic.person { background: radial-gradient(circle at 36% 30%, #aeb9e8, #7482c2 70%); color: #fff; }
  .gd-tx { flex: 1; min-width: 0; }
  .gd-type { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--peri); }
  .gd-nm { font-family: Dosis, sans-serif; font-weight: 600; font-size: 18px; color: var(--ink); line-height: 1.15; margin-top: 1px; }
  .gd-close { width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer; background: transparent; color: var(--faint); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .gd-sub { font-size: 13px; line-height: 1.5; color: var(--muted); margin: 13px 0 0; }
  .gd-links { margin-top: 14px; }
  .gd-lh { font-size: 11px; font-weight: 600; color: var(--faint); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
  .gd-chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .gd-chip { display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 11px; border-radius: 100px; background: #fff; box-shadow: inset 0 0 0 1px var(--line); font-size: 12.5px; color: var(--ink); cursor: pointer; }
  .gd-chip svg { color: var(--peri); }
  .gd-open { margin-top: 16px; width: 100%; height: 48px; border-radius: 14px; border: none; cursor: pointer; background: var(--navy); color: #fff; font-family: Vazirmatn; font-weight: 600; font-size: 14px; transition: filter .15s ease, transform .12s ease; }
  .gd-open:active { transform: scale(.98); }

  /* hint pill */
  .g-hint { position: absolute; left: 50%; bottom: 108px; transform: translateX(-50%); z-index: 25; display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 15px; border-radius: 100px; background: rgba(251,251,249,.85); backdrop-filter: blur(6px); box-shadow: inset 0 0 0 1px var(--line); font-size: 12px; color: var(--muted); transition: opacity .3s ease; }

  /* bottom nav */
  .nav { position: relative; z-index: 20; height: 96px; padding: 0 30px 22px; display: flex; align-items: flex-end; justify-content: space-between; background: linear-gradient(180deg, rgba(244,244,241,0), var(--bg) 55%); }
  .navitem { display: flex; flex-direction: column; align-items: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 6px; font-size: 11px; font-weight: 500; color: var(--faint); }
  .navitem.is-active { color: var(--navy); }
  .navspacer { width: 64px; }
  .navmic { position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%); width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer;
    background: radial-gradient(circle at 38% 30%, #8b98d6, #5b69ad); box-shadow: 0 14px 28px -8px rgba(70,85,150,.6), inset 0 2px 4px rgba(255,255,255,.4); display: flex; align-items: center; justify-content: center; }

  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } .g-pan { transition: none; } }
</style>
</head>
<body>
  <div id="wrap"><div id="stage">
    <div class="bezel"><div class="screen" data-screen-label="Memory graph">
      <div class="island"></div>
      <div class="statusbar"><span class="clock">9:41</span>
        <span><svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1" fill="#1B1C24"/><rect x="5" y="4" width="3" height="8" rx="1" fill="#1B1C24"/><rect x="10" y="2" width="3" height="10" rx="1" fill="#1B1C24"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#1B1C24"/></svg></span>
      </div>

      <div class="g-header">
        <div class="g-titlerow">
          <div class="g-title">Your memory<small>34 memories · 61 connections</small></div>
          <button class="g-icbtn" aria-label="Search"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#6B6C73" stroke-width="1.9" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg></button>
        </div>
        <div class="g-filters" id="filters">
          <button class="fchip is-active">All</button>
          <button class="fchip"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6" stroke-linecap="round"/></svg>People</button>
          <button class="fchip"># Topics</button>
          <button class="fchip">Tasks</button>
          <button class="fchip">Recent</button>
        </div>
      </div>

      <div class="g-canvas" id="canvas">
        <div class="g-pan" id="pan">
          <svg class="g-edges" id="edges"></svg>
          <!-- nodes injected here -->
        </div>
        <div class="g-hint" id="hint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 12h8M12 8v8"/><circle cx="12" cy="12" r="9"/></svg>Tap a memory · drag to explore</div>

        <div class="g-detail" id="detail">
          <div class="gd-top">
            <div class="gd-ic" id="gdIc"></div>
            <div class="gd-tx"><div class="gd-type" id="gdType"></div><div class="gd-nm" id="gdNm"></div></div>
            <button class="gd-close" onclick="closeDetail()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
          </div>
          <p class="gd-sub" id="gdSub"></p>
          <div class="gd-links">
            <div class="gd-lh" id="gdLh">Connected to</div>
            <div class="gd-chips" id="gdChips"></div>
          </div>
          <button class="gd-open">Open memory</button>
        </div>
      </div>

      <div class="nav">
        <button class="navitem"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Home</button>
        <button class="navitem"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h11"/><path d="M4 10h11"/><path d="M4 15h7"/><circle cx="18.5" cy="16.5" r="3"/><path d="M20.8 18.8 23 21"/></svg>Library</button>
        <div class="navspacer"></div>
        <button class="navitem is-active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.4"/><circle cx="5.5" cy="18" r="2.4"/><circle cx="18.5" cy="18" r="2.4"/><path d="M11 7 6.6 15.8"/><path d="M13 7l4.4 8.8"/><path d="M7.9 18h8.2"/></svg>Canvas</button>
        <button class="navitem"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg>Brief</button>
        <button class="navmic" aria-label="Capture"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg></button>
      </div>

      <div class="home-indicator"></div>
    </div></div>
  </div></div>

  <script>
    // ── icons ─────────────────────────────────────────────
    const IC = {
      task:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg>',
      event: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="17" rx="2.5"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
      note:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
      book:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v18H6.5A2.5 2.5 0 0 0 4 22.5z"/><path d="M4 4.5v15"/></svg>',
      idea:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.2 1 2h6c0-.8.4-1.5 1-2A7 7 0 0 0 12 2Z"/></svg>',
      topic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h16M4 15h16M10 3 8 21M16 3l-2 18"/></svg>',
      music: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 18V5l10-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="16" cy="16" r="3"/></svg>'
    };

    // ── data: two calm clusters + one bridge ──────────────
    const nodes = [
      // Work / John cluster
      { id:'john',   x:112, y:150, size:'hub', type:'person', label:'John', initial:'J', typ:'Person', sub:'6 linked memories — mostly around the contract and your weekly calls.' },
      { id:'contract', x:60, y:262, size:'mid', type:'task', label:'Contract', typ:'Task', sub:'Call John before Friday to confirm terms and send the signed copy.' },
      { id:'meeting', x:176, y:280, size:'sm', type:'event', label:'Meeting', typ:'Event', sub:'Tomorrow · 3:00 PM with John.' },
      { id:'draft',  x:120, y:60,  size:'sm', type:'note', label:'Draft v2', typ:'Note', sub:'Contract draft — captured 2h ago.' },
      { id:'work',   x:196, y:170, size:'mid', type:'topic', label:'Work', typ:'Topic', sub:'12 memories tagged with work.' },
      // Leisure / Maya cluster
      { id:'maya',   x:262, y:430, size:'hub', type:'person', label:'Maya', initial:'M', typ:'Person', sub:'A friend — books, jazz, and weekend plans keep coming back to her.' },
      { id:'book',   x:300, y:318, size:'sm', type:'book', label:'The Overstory', typ:'Book', sub:'Recommended by Maya — captured by voice yesterday.' },
      { id:'jazz',   x:328, y:520, size:'mid', type:'topic', label:'Jazz', typ:'Topic', sub:'5 memories about live music and jazz.' },
      { id:'blue',   x:230, y:560, size:'sm', type:'event', label:'Blue Note', typ:'Event', sub:'Fri, Jul 18 · 8 PM at The Corner Room. From a photo you took.' },
      { id:'coast',  x:150, y:452, size:'sm', type:'idea', label:'Coast weekend', typ:'Idea', sub:'A quiet weekend on the coast in spring.' }
    ];
    const edges = [
      ['john','contract'],['john','meeting'],['john','draft'],['contract','meeting'],
      ['john','work'],['contract','work'],['draft','work'],
      ['maya','book'],['maya','jazz'],['maya','blue'],['blue','jazz'],['maya','coast'],
      ['coast','john']  // gentle bridge between the two clusters
    ];
    const adj = {}; nodes.forEach(n => adj[n.id] = []);
    edges.forEach(([a,b]) => { adj[a].push(b); adj[b].push(a); });
    const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
    const iconType = { task:'task', event:'event', note:'note', book:'book', idea:'idea', topic:'topic' };

    // ── render ────────────────────────────────────────────
    const pan = document.getElementById('pan');
    const svg = document.getElementById('edges');
    const NS = 'http://www.w3.org/2000/svg';

    edges.forEach(([a,b], i) => {
      const l = document.createElementNS(NS,'line');
      const A = byId[a], B = byId[b];
      l.setAttribute('x1',A.x); l.setAttribute('y1',A.y);
      l.setAttribute('x2',B.x); l.setAttribute('y2',B.y);
      l.setAttribute('class','edge'); l.dataset.a=a; l.dataset.b=b;
      svg.appendChild(l);
    });

    nodes.forEach((n, i) => {
      const el = document.createElement('div');
      el.className = `node s-${n.size} t-${n.type}` + (n.type==='person' ? ' pulse' : '');
      el.style.left = n.x+'px'; el.style.top = n.y+'px';
      el.dataset.id = n.id;
      const inner = n.type==='person'
        ? `<span class="initial">${n.initial}</span>`
        : (IC[n.type] ? IC[n.type] : IC.note);
      const iconSize = n.size==='hub' ? 26 : (n.size==='mid' ? 22 : 20);
      el.innerHTML = `<div class="node-inner"><div class="disc">${n.type==='person' ? inner : `<span style="width:${iconSize}px;height:${iconSize}px;display:flex">${inner}</span>`}</div><div class="lbl">${n.label}</div></div>`;
      el.addEventListener('click', (e) => { e.stopPropagation(); selectNode(n.id); });
      // gentle idle float (on inner wrapper so node centering is preserved)
      el.querySelector('.node-inner').style.animation = `floatY ${6 + (i%4)}s ease-in-out ${i*0.4}s infinite`;
      pan.appendChild(el);
    });

    const nodeEls = [...pan.querySelectorAll('.node')];
    const edgeEls = [...svg.querySelectorAll('.edge')];

    // ── selection / focus ─────────────────────────────────
    function selectNode(id) {
      const n = byId[id];
      const near = new Set([id, ...adj[id]]);
      nodeEls.forEach(el => {
        el.classList.toggle('sel', el.dataset.id === id);
        el.classList.toggle('dim', !near.has(el.dataset.id));
      });
      edgeEls.forEach(el => {
        const hot = el.dataset.a === id || el.dataset.b === id;
        el.classList.toggle('hot', hot);
        el.classList.toggle('dim', !hot);
      });
      // recenter the pan on this node (calming focus)
      const cw = document.getElementById('canvas').clientWidth;
      const dx = cw/2 - n.x, dy = 168 - n.y;
      offX = dx; offY = dy; applyPan();

      fillDetail(n);
      document.getElementById('hint').style.opacity = 0;
    }

    function fillDetail(n) {
      const d = document.getElementById('detail');
      const ic = document.getElementById('gdIc');
      ic.className = 'gd-ic' + (n.type==='person' ? ' person' : '');
      ic.innerHTML = n.type==='person'
        ? `<span class="initial" style="font-size:20px">${n.initial}</span>`
        : `<span style="width:22px;height:22px;display:flex">${IC[n.type]||IC.note}</span>`;
      document.getElementById('gdType').textContent = n.typ;
      document.getElementById('gdNm').textContent = n.label;
      document.getElementById('gdSub').textContent = n.sub;
      document.getElementById('gdLh').textContent = `Connected to ${adj[n.id].length}`;
      const chips = document.getElementById('gdChips');
      chips.innerHTML = '';
      adj[n.id].forEach(cid => {
        const c = byId[cid];
        const chip = document.createElement('button');
        chip.className = 'gd-chip';
        chip.innerHTML = `<span style="width:14px;height:14px;display:flex">${c.type==='person' ? '<svg viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\'><circle cx=\'12\' cy=\'8\' r=\'4\'/><path d=\'M4 21c0-4 4-6 8-6s8 2 8 6\' stroke-linecap=\'round\'/></svg>' : (IC[c.type]||IC.note)}</span>${c.label}`;
        chip.addEventListener('click', (e)=>{ e.stopPropagation(); selectNode(cid); });
        chips.appendChild(chip);
      });
      d.classList.add('show');
    }

    function closeDetail() {
      document.getElementById('detail').classList.remove('show');
      nodeEls.forEach(el => el.classList.remove('sel','dim'));
      edgeEls.forEach(el => el.classList.remove('hot','dim'));
      offX = 0; offY = 0; applyPan();
      document.getElementById('hint').style.opacity = 1;
    }
    document.getElementById('canvas').addEventListener('click', closeDetail);

    // ── pan (drag to explore) ─────────────────────────────
    let offX=0, offY=0, drag=null;
    function applyPan(){ pan.style.transform = `translate(${offX}px, ${offY}px)`; }
    const canvas = document.getElementById('canvas');
    canvas.addEventListener('pointerdown', e => { drag={x:e.clientX, y:e.clientY, ox:offX, oy:offY, moved:false}; pan.style.transition='none'; });
    canvas.addEventListener('pointermove', e => {
      if(!drag) return;
      const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
      if(Math.abs(dx)+Math.abs(dy) > 4) drag.moved=true;
      offX = drag.ox + dx; offY = drag.oy + dy; applyPan();
    });
    addEventListener('pointerup', () => { if(drag){ pan.style.transition=''; drag=null; } });

    // filter chips (visual only)
    document.getElementById('filters').addEventListener('click', e => {
      const b = e.target.closest('.fchip'); if(!b) return;
      [...document.querySelectorAll('.fchip')].forEach(c=>c.classList.remove('is-active'));
      b.classList.add('is-active');
    });

    // Landing state: the calm, full constellation. Frame it nicely.
    offX = -10; offY = -38; applyPan();

    function fit() {
      const stage = document.getElementById('stage');
      const bezel = stage.querySelector('.bezel');
      const scale = Math.min((innerWidth - 40) / bezel.offsetWidth, (innerHeight - 40) / bezel.offsetHeight, 1.15);
      stage.style.transform = `scale(${scale})`;
    }
    addEventListener('resize', fit); fit(); setTimeout(fit, 200);
  </script>
</body>
</html>
