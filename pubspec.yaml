name: mira_app
description: "Mira — Flutter app (component-first rebuild)."
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.17
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.5
  record: 6.1.2
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  google_sign_in: ^6.3.0
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/figma/nav_home.svg
    - assets/images/figma/nav_mic.svg
    - assets/images/figma/nav_coffee.svg
    - assets/images/figma/settings_icon.svg
    - assets/images/figma/settings_icon.png
    - assets/images/figma/graph_icon.png
    - assets/images/figma/tip_arrow.svg
    - assets/images/figma/mira_ball.png
    - assets/images/onboarding/welcome_illustration.png
    - assets/images/daily_brief/landscape_thumb.png
    - dart_defines.json

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/app_icon.png
