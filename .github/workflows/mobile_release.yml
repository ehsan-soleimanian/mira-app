name: Mobile Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

env:
  MOBILE_APK_URL: https://miramind.io/downloads/mira-latest.apk
  MOBILE_MANIFEST_URL: https://miramind.io/downloads/version.json

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  release:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Compute release version
        id: version
        run: |
          BASE=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          BUILD=${{ github.run_number }}
          echo "name=${BASE}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"
          echo "full=${BASE}+${BUILD}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_KEY_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=release.keystore
          EOF
          fi

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name="${{ steps.version.outputs.name }}" \
            --build-number="${{ steps.version.outputs.build }}" \
            --dart-define=API_BASE_URL=https://api.miramind.io

      - name: Create version manifest
        run: |
          cat > version.json <<EOF
          {
            "versionName": "${{ steps.version.outputs.name }}",
            "buildNumber": ${{ steps.version.outputs.build }},
            "minBuildNumber": 1,
            "downloadUrl": "${{ env.MOBILE_APK_URL }}",
            "optional": true
          }
          EOF

      - name: Upload APK to miramind.io
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          export DEPLOY_SSH_KEY_FILE=~/.ssh/deploy_key
          bash scripts/deploy-mobile-apk.sh \
            build/app/outputs/flutter-apk/app-release.apk \
            version.json

      - name: Verify public manifest
        run: |
          curl -sf "${{ env.MOBILE_MANIFEST_URL }}" | tee /tmp/version.json
          grep -q '"downloadUrl".*miramind.io/downloads/mira-latest.apk' /tmp/version.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.full }}
          name: Mira ${{ steps.version.outputs.full }}
          body: |
            Automated Android release for commit ${{ github.sha }}.

            Production download: ${{ env.MOBILE_APK_URL }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            version.json
          draft: false
          prerelease: false
